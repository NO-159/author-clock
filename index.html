<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="문학시계">
    
    <title>Author Clock</title>
    <style>
        /* 전체 화면 및 배경 설정 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh; 
            width: 100vw;
            overflow: hidden;
            /* body 전체에 걸려있던 드래그 금지 해제 (개별 영역에만 적용) */
        }

        /* 메인 컨테이너 (가로 모드 기준 완벽한 중앙 정렬) */
        .standby-container {
            display: flex;
            flex-direction: row;
            align-items: center; /* 세로 기준 완벽한 중앙 정렬 */
            width: 100%;
            height: 100%;
            /* 위아래 패딩을 동일하게 주고 좌우에만 아이폰 노치(안전영역) 고려 */
            padding: 0 max(8vw, env(safe-area-inset-right)) 0 max(8vw, env(safe-area-inset-left));
            box-sizing: border-box;
            background-color: #000000;
        }

        /* 좌측: 스와이프 영역 (시계/달력 공통) */
        .swipe-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: grab;
            
            /* 🔥 시계와 달력 영역만 드래그 및 터치 하이라이트 금지 🔥 */
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .swipe-section:active {
            cursor: grabbing;
        }

        /* 공통 뷰 클래스 */
        .view-pane {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            position: absolute;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .hidden { opacity: 0; transform: scale(0.95); pointer-events: none; }
        .active { opacity: 1; transform: scale(1); pointer-events: auto; }

        /* 아날로그 시계 UI */
        .clock {
            width: 250px;
            height: 250px;
            max-width: 60vw;
            max-height: 60vw;
            border: 4px solid #333;
            border-radius: 50%;
            position: relative;
            background-color: #000;
        }

        .clock .center-dot {
            position: absolute;
            top: 50%; left: 50%;
            width: 12px; height: 12px;
            background-color: #ff3b30;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%; left: 50%;
            transform-origin: bottom;
            border-radius: 10px;
            z-index: 5;
            transition: transform 0.05s cubic-bezier(0.4, 2.08, 0.55, 0.44);
        }

        .hour-hand { width: 6px; height: 25%; background-color: #fff; margin-left: -3px; }
        .minute-hand { width: 4px; height: 38%; background-color: #fff; margin-left: -2px; }
        .second-hand { width: 2px; height: 45%; background-color: #ff3b30; margin-left: -1px; z-index: 6; }

        /* 달력 UI */
        .calendar-container { width: 100%; max-width: 300px; text-align: center; }
        .calendar-header { font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; color: #ff3b30; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; font-size: 1rem; }
        .calendar-day-name { color: #8e8e93; font-size: 0.9rem; margin-bottom: 5px; }
        .calendar-date { padding: 5px; border-radius: 50%; width: 25px; height: 25px; display: flex; justify-content: center; align-items: center; margin: 0 auto; }
        .today { background-color: #ff3b30; color: #fff; font-weight: bold; }

        /* 우측 문장 영역 */
        .quote-section {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 6vw;

            /* 🔥 글귀 영역은 드래그 및 복사 허용 🔥 */
            -webkit-user-select: text;
            user-select: text;
        }

        .quote-text {
            font-size: 1.5rem;
            line-height: 1.6;
            font-weight: 500;
            word-break: keep-all;
            margin-bottom: 20px;
        }

        .time-highlight { color: #ff3b30; font-weight: bold; }
        .quote-author { font-size: 1rem; color: #8e8e93; text-align: right; font-style: italic; }

        /* 세로 모드(Portrait) 대응 */
        @media (orientation: portrait) {
            .standby-container { 
                flex-direction: column; 
                /* 세로 모드에서는 노치와 하단 홈 바를 피해 여백 설정 */
                padding: max(15vw, env(safe-area-inset-top)) 8vw max(10vw, env(safe-area-inset-bottom)) 8vw; 
            }
            .swipe-section { flex: 1; align-items: flex-end; padding-bottom: 10vw; }
            .quote-section { flex: 1; padding-left: 0; padding-top: 5vw; justify-content: flex-start; }
            .quote-text { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div class="standby-container">
        <div class="swipe-section" id="swipe-section">
            <div id="view-clock" class="view-pane active">
                <div class="clock">
                    <div class="hand hour-hand" id="hour"></div>
                    <div class="hand minute-hand" id="minute"></div>
                    <div class="hand second-hand" id="second"></div>
                    <div class="center-dot"></div>
                </div>
            </div>

            <div id="view-calendar" class="view-pane hidden">
                <div class="calendar-container">
                    <div class="calendar-header" id="calendar-month"></div>
                    <div class="calendar-grid" id="calendar-grid"></div>
                </div>
            </div>
        </div>

        <div class="quote-section">
            <div class="quote-text" id="quote-text">시간을 불러오는 중...</div>
            <div class="quote-author" id="quote-author"></div>
        </div>
    </div>

    <script>
        const quotesDB = {
            "12:00": { text: "<span class='time-highlight'>정오(12시)</span>, 나는 자릿조끼를 입은 채 어물어물 내 방을 나섰다. 그리고 옥상으로 올라갔다.", author: "- 이상, 『날개』 중" },
            "23:00": { text: "밤 <span class='time-highlight'>열한 시</span>가 되었다. 사위는 고요하고, 멀리서 개 짖는 소리만이 간간이 들려올 뿐이었다.", author: "- 김유정, 단편 소설풍" }
        };

        const hourHand = document.getElementById('hour');
        const minuteHand = document.getElementById('minute');
        const secondHand = document.getElementById('second');
        const quoteText = document.getElementById('quote-text');
        const quoteAuthor = document.getElementById('quote-author');

        let lastMinute = -1;

        function updateClock() {
            const now = new Date();
            const seconds = now.getSeconds();
            const minutes = now.getMinutes();
            const hours = now.getHours();

            const secondsDegrees = ((seconds / 60) * 360);
            const minutesDegrees = ((minutes / 60) * 360) + ((seconds / 60) * 6);
            const hoursDegrees = ((hours / 12) * 360) + ((minutes / 60) * 30);

            secondHand.style.transform = `rotate(${secondsDegrees}deg)`;
            minuteHand.style.transform = `rotate(${minutesDegrees}deg)`;
            hourHand.style.transform = `rotate(${hoursDegrees}deg)`;

            if (minutes !== lastMinute) {
                updateQuote(hours, minutes);
                lastMinute = minutes;
            }
        }

        function updateQuote(h, m) {
            const timeKey = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
            
            if (quotesDB[timeKey]) {
                quoteText.innerHTML = quotesDB[timeKey].text;
                quoteAuthor.innerHTML = quotesDB[timeKey].author;
            } else {
                const ampm = h >= 12 ? '오후' : '오전';
                const displayH = h % 12 || 12;
                
                const fallbackTemplates = [
                    { text: `어느덧 시계는 <span class='time-highlight'>${ampm} ${displayH}시 ${m}분</span>을 향해 가고 있었다. 고요한 적막만이 방 안을 채웠다.`, author: "- 어느 무명 작가의 기록" },
                    { text: `창밖으로 시선을 던진 그는, 지금이 <span class='time-highlight'>${ampm} ${displayH}시 ${m}분</span>이라는 사실을 깨달았다.`, author: "- 잊혀진 소설의 한 구절" },
                    { text: `"<span class='time-highlight'>${ampm} ${displayH}시 ${m}분</span>이네." 누군가 나지막이 중얼거리는 소리가 허공에 흩어졌다.`, author: "- 이름 모를 일기장" },
                    { text: `벽시계의 초침 소리가 유난히 크게 들려왔다. 시간은 이미 <span class='time-highlight'>${displayH}시 ${m}분</span>을 지나고 있었다.`, author: "- 시간의 단편" },
                    { text: `<span class='time-highlight'>${ampm} ${displayH}시 ${m}분</span>. 무언가를 새로 시작하기에도, 끝맺기에도 묘하게 애매한 시간이었다.`, author: "- 미상의 엽서" },
                    { text: `그녀는 낡은 시계를 물끄러미 바라보았다. 시곗바늘은 정확히 <span class='time-highlight'>${ampm} ${displayH}시 ${m}분</span>을 가리키고 있었다.`, author: "- 어느 겨울밤의 묘사" },
                    { text: `눈을 깜빡일 때마다 시간이 흘렀다. 탁상시계의 숫자가 <span class='time-highlight'>${ampm} ${displayH}시 ${m}분</span>으로 바뀌는 찰나였다.`, author: "- 자정의 독백" },
                    { text: `어디선가 나직한 소리가 울려 퍼진 것 같았다. <span class='time-highlight'>${displayH}시 ${m}분</span>을 알리는 신호일지도 몰랐다.`, author: "- 낡은 서재에서" }
                ];

                const index = (h * 60 + m) % fallbackTemplates.length;
                const selectedFallback = fallbackTemplates[index];

                quoteText.innerHTML = selectedFallback.text;
                quoteAuthor.innerHTML = selectedFallback.author;
            }
        }

        setInterval(updateClock, 1000);
        updateClock();

        function renderCalendar() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const date = now.getDate();

            document.getElementById('calendar-month').innerText = `${year}년 ${month + 1}월`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid');
            
            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            let html = '';

            dayNames.forEach(day => { html += `<div class="calendar-day-name">${day}</div>`; });
            for (let i = 0; i < firstDay; i++) { html += `<div></div>`; }
            for (let i = 1; i <= lastDate; i++) {
                html += `<div class="calendar-date ${i === date ? 'today' : ''}">${i}</div>`;
            }
            grid.innerHTML = html;
        }
        renderCalendar();

        const swipeSection = document.getElementById('swipe-section');
        const viewClock = document.getElementById('view-clock');
        const viewCalendar = document.getElementById('view-calendar');
        
        let startX = 0;
        let endX = 0;
        let isClockVisible = true;
        let isDragging = false;

        function toggleView() {
            if (isClockVisible) {
                viewClock.classList.replace('active', 'hidden');
                viewCalendar.classList.replace('hidden', 'active');
            } else {
                viewCalendar.classList.replace('active', 'hidden');
                viewClock.classList.replace('hidden', 'active');
            }
            isClockVisible = !isClockVisible;
        }

        function handleGesture() {
            if (endX < startX - 40) toggleView(); 
            else if (endX > startX + 40) toggleView(); 
        }

        swipeSection.addEventListener('touchstart', e => { startX = e.changedTouches[0].screenX; });
        swipeSection.addEventListener('touchend', e => { endX = e.changedTouches[0].screenX; handleGesture(); });

        swipeSection.addEventListener('mousedown', e => { isDragging = true; startX = e.clientX; });
        window.addEventListener('mouseup', e => {
            if (!isDragging) return;
            endX = e.clientX;
            isDragging = false;
            handleGesture();
        });
    </script>
</body>
</html>
